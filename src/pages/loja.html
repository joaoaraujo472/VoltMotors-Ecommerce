<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>VOLT MOTORS — Carrinho</title>

  <link rel="stylesheet" href="/src/css/style.css" />

  <!-- Basic Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">

  <!-- Filled Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">

  <!-- Brand Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>

<body>

    <header>
        <nav class="navbar">

            <div class="logo" href="/index.html">
                <img src="/src/assets/img/logo.png" alt="">
            </div>

            <ul class="nav-links">

                <li>
                <a href="/index.html">
                    <i class='bx bx-home'></i>
                    Início
                </a>
                </li>

                <li>
                <a href="/src/pages/loja.html">
                    <i class='bx bx-cart'></i>
                    Loja
                </a>
                </li>

                <li>
                <a href="/src/pages/sobre.html">
                    <i class='bx bx-info-circle'></i>
                    Sobre
                </a>
                </li>

            </ul>

        </nav>

  </header>

<main class="main-carrinho">

  <!-- TOPO -->
  <section class="topo-carrinho">

        <div>
        <p class="mini-texto">
            CHECKOUT
        </p>

        <h1 class="section-titulo">
            Seu Carrinho
        </h1>
        </div>

        <div class="quantidade-itens">
        <i class='bx bx-cart'></i>
        <span>4 itens</span>
        </div>

  </section>

    <!-- WRAPPER -->
    <div class="carrinho-wrapper">

        <!-- LISTA -->
        <section
        class="lista-produtos"
        aria-label="Itens do carrinho"
        >

        <ul
            id="lista-carrinho"
            class="lista-carrinho"
        >

        </ul>

        </section>

    <!-- RESUMO -->
    <aside class="resumo-financeiro">

      <h2 class="resumo-titulo">
        Resumo da Compra
      </h2>

      <div class="resumo-linha">
        <span>Subtotal</span>
        <span id="subtotal">R$ 0,00</span>
      </div>

      <div class="resumo-linha">
        <span>Frete</span>

        <span class="verde">
          Grátis
        </span>
      </div>

      <!-- DESCONTO -->
      <div
        class="resumo-linha"
        id="linha-desconto"
        style="display: none;"
      >

        <span>Desconto (10%)</span>

        <span></span>

      </div>

      <!-- TOTAL -->
      <div class="resumo-total">

        <span class="resumo-total-label">
          Total
        </span>

        <span id="total-compra">
          R$ 0,00
        </span>

      </div>

      <!-- CUPOM -->
      <div class="cupom-box">

        <input
          type="text"
          placeholder="Cupom de desconto"
        >

        <button>
          Aplicar
        </button>

      </div>

      <!-- BOTÕES -->
      <button
        class="btn-desconto"
        id="btn-desconto"
      >

        ⚡ Aplicar desconto de 10%

      </button>

      <button class="btn-finalizar">

        Finalizar Compra →

      </button>

    </aside>

  </div>

</main>

  <script src="/src/js/script.js"></script>

</body>
</html>
